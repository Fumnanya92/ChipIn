<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#11b4d4",
                        "background-light": "#f6f8f8",
                        "background-dark": "#101f22",
                    },
                    fontFamily: {
                        "display": ["Inter"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        .camera-scan-overlay {
            background: radial-gradient(circle, transparent 60%, rgba(16, 31, 34, 0.8) 61%);
        }
        .scan-ring {
            border: 4px solid #11b4d4;
            box-shadow: 0 0 20px rgba(17, 180, 212, 0.5);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 antialiased">
<div class="relative flex h-screen w-full max-w-md mx-auto flex-col bg-background-light dark:bg-background-dark overflow-hidden">
<!-- Header -->
<div class="flex items-center p-4 justify-between bg-transparent">
<div class="text-slate-900 dark:text-slate-100 flex size-12 shrink-0 items-center justify-center cursor-pointer">
<span class="material-symbols-outlined text-2xl">arrow_back</span>
</div>
<h2 class="text-slate-900 dark:text-slate-100 text-lg font-bold leading-tight tracking-tight flex-1 text-center pr-12">ID Verification</h2>
</div>
<!-- Progress Bar -->
<div class="flex flex-col gap-3 px-6 py-2">
<div class="flex gap-6 justify-between items-center">
<p class="text-slate-900 dark:text-slate-100 text-sm font-medium">Selfie Capture</p>
<p class="text-slate-500 dark:text-slate-400 text-xs font-normal">Step 2 of 3</p>
</div>
<div class="rounded-full bg-slate-200 dark:bg-slate-800 h-1.5 w-full overflow-hidden">
<div class="h-full rounded-full bg-primary w-2/3"></div>
</div>
</div>
<!-- Main Content -->
<div class="flex flex-1 flex-col items-center justify-center px-6">
<h3 class="text-slate-900 dark:text-slate-100 tracking-tight text-2xl font-bold leading-tight text-center mb-8">
                Center your face in the circle
            </h3>
<!-- Camera Preview Container -->
<div class="relative w-72 h-72 sm:w-80 sm:h-80 flex items-center justify-center">
<!-- Mock Camera Feed -->
<div class="absolute inset-0 rounded-full overflow-hidden bg-slate-800">
<img alt="Person face for biometric scan" class="w-full h-full object-cover opacity-60 grayscale-[0.2]" data-alt="Close up portrait of a person face for biometric scan" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAEOonvOWlJB_8UnO1JNLE7QJcWhG3dXrBWYMo8Y8rwsSCgFU8zAVHPo269JxcddgqesdThV7jIt5PZ6ioAPZ23tURFD7C4E16Rq137yyxY5x3QGAFuTF_gyvLAyZRSkkclB5Wqa_p56zmp8OouBa4FMquoonk3XsucBe7E5wEFeJormTGvsF6DiFW8GUwwZWbOuR6o_98lI9vmn36fCMxl-1WYm-yfDFP9rwf57iiQO6PJ47pP33fge7VvGp17jIpLa2iXxEgQ9eub"/>
</div>
<!-- Scan Ring UI -->
<div class="absolute inset-0 rounded-full scan-ring"></div>
<!-- Scanning Effect Overlays -->
<div class="absolute inset-4 rounded-full border border-primary/30 border-dashed animate-pulse"></div>
<!-- Corners/Guides -->
<div class="absolute -top-2 -left-2 w-8 h-8 border-t-4 border-l-4 border-primary rounded-tl-xl"></div>
<div class="absolute -top-2 -right-2 w-8 h-8 border-t-4 border-right-4 border-primary rounded-tr-xl border-r-4"></div>
<div class="absolute -bottom-2 -left-2 w-8 h-8 border-b-4 border-l-4 border-primary rounded-bl-xl"></div>
<div class="absolute -bottom-2 -right-2 w-8 h-8 border-b-4 border-right-4 border-primary rounded-br-xl border-r-4"></div>
</div>
<p class="text-slate-600 dark:text-slate-400 text-base font-normal leading-relaxed text-center mt-12 max-w-[280px]">
                This helps us verify that you are the owner of the ID provided.
            </p>
</div>
<!-- Bottom Controls -->
<div class="p-6 pb-10 flex flex-col gap-4">
<div class="flex items-center justify-center gap-8 mb-4">
<button class="flex shrink-0 items-center justify-center rounded-full size-12 bg-slate-200 dark:bg-slate-800 text-slate-700 dark:text-slate-300">
<span class="material-symbols-outlined">image</span>
</button>
<!-- Capture Button -->
<button class="flex shrink-0 items-center justify-center rounded-full size-20 bg-primary text-white shadow-lg shadow-primary/20 active:scale-95 transition-transform">
<span class="material-symbols-outlined text-4xl">photo_camera</span>
</button>
<button class="flex shrink-0 items-center justify-center rounded-full size-12 bg-slate-200 dark:bg-slate-800 text-slate-700 dark:text-slate-300">
<span class="material-symbols-outlined">flip_camera_ios</span>
</button>
</div>
<button class="w-full py-4 bg-primary text-white font-bold rounded-xl text-center shadow-xl shadow-primary/10">
                Capture Selfie
            </button>
</div>
<!-- Decorative Elements -->
<div class="absolute top-0 right-0 -mr-20 -mt-20 w-64 h-64 bg-primary/5 rounded-full blur-3xl"></div>
<div class="absolute bottom-0 left-0 -ml-20 -mb-20 w-64 h-64 bg-primary/5 rounded-full blur-3xl"></div>
</div>
</body></html>
