<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>ChipIn ID Verification</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#11b4d4",
                        "background-light": "#f6f8f8",
                        "background-dark": "#101f22",
                    },
                    fontFamily: {
                        "display": ["Inter"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Inter', sans-serif;
        }
        .scanner-frame {
            position: relative;
            overflow: hidden;
        }
        .scanner-corner {
            position: absolute;
            width: 32px;
            height: 32px;
            border-color: #11b4d4;
            border-width: 4px;
        }
        .top-left { top: 0; left: 0; border-right: 0; border-bottom: 0; }
        .top-right { top: 0; right: 0; border-left: 0; border-bottom: 0; }
        .bottom-left { bottom: 0; left: 0; border-right: 0; border-top: 0; }
        .bottom-right { bottom: 0; right: 0; border-left: 0; border-top: 0; }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 min-h-screen">
<div class="relative flex h-auto min-h-screen w-full max-w-md mx-auto flex-col bg-background-light dark:bg-background-dark overflow-x-hidden">
<div class="flex items-center p-4 pb-2 justify-between">
<button class="text-slate-900 dark:text-slate-100 flex size-12 shrink-0 items-center justify-center hover:bg-primary/10 rounded-full transition-colors">
<span class="material-symbols-outlined">arrow_back</span>
</button>
<h2 class="text-slate-900 dark:text-slate-100 text-lg font-bold leading-tight tracking-[-0.015em] flex-1 text-center pr-12">ID Verification</h2>
</div>
<div class="flex flex-col gap-3 p-4">
<div class="flex gap-6 justify-between items-end">
<p class="text-slate-900 dark:text-slate-100 text-base font-medium leading-normal">Document Upload</p>
<p class="text-slate-500 dark:text-slate-400 text-sm font-normal leading-normal">Step 2 of 5</p>
</div>
<div class="rounded-full bg-primary/20 h-2 w-full overflow-hidden">
<div class="h-full rounded-full bg-primary" style="width: 40%;"></div>
</div>
</div>
<div class="px-4 pt-6">
<h3 class="text-slate-900 dark:text-slate-100 tracking-tight text-2xl font-bold leading-tight">Scan your ID</h3>
<p class="text-slate-600 dark:text-slate-400 text-base font-normal leading-relaxed pt-2">Please select your document type and capture a clear photo of the front side. Ensure all details are legible.</p>
</div>
<div class="mt-6">
<div class="flex border-b border-primary/10 px-4 gap-4 overflow-x-auto no-scrollbar">
<button class="flex flex-col items-center justify-center border-b-2 border-primary text-primary pb-3 pt-2 whitespace-nowrap px-2">
<span class="text-sm font-bold tracking-wide">Passport</span>
</button>
<button class="flex flex-col items-center justify-center border-b-2 border-transparent text-slate-500 dark:text-slate-400 pb-3 pt-2 whitespace-nowrap px-2 hover:text-primary transition-colors">
<span class="text-sm font-bold tracking-wide">Driver's License</span>
</button>
<button class="flex flex-col items-center justify-center border-b-2 border-transparent text-slate-500 dark:text-slate-400 pb-3 pt-2 whitespace-nowrap px-2 hover:text-primary transition-colors">
<span class="text-sm font-bold tracking-wide">National ID</span>
</button>
</div>
</div>
<div class="flex-1 p-6 flex flex-col items-center justify-center gap-8">
<div class="w-full aspect-[3/2] max-w-sm scanner-frame bg-slate-200 dark:bg-slate-800 rounded-xl relative flex items-center justify-center shadow-2xl">
<div class="scanner-corner top-left rounded-tl-lg"></div>
<div class="scanner-corner top-right rounded-tr-lg"></div>
<div class="scanner-corner bottom-left rounded-bl-lg"></div>
<div class="scanner-corner bottom-right rounded-br-lg"></div>
<div class="flex flex-col items-center gap-3 text-slate-400">
<span class="material-symbols-outlined text-5xl">photo_camera</span>
<p class="text-sm font-medium">Position ID within frame</p>
</div>
<div class="absolute inset-0 bg-gradient-to-t from-primary/5 to-transparent pointer-events-none"></div>
</div>
<div class="flex flex-col w-full gap-4">
<button class="w-full bg-primary hover:bg-primary/90 text-white font-bold py-4 rounded-xl flex items-center justify-center gap-2 transition-all shadow-lg shadow-primary/20">
<span class="material-symbols-outlined">camera</span>
                    Capture Photo
                </button>
<button class="w-full bg-slate-200 dark:bg-slate-800 hover:bg-slate-300 dark:hover:bg-slate-700 text-slate-900 dark:text-slate-100 font-semibold py-4 rounded-xl flex items-center justify-center gap-2 transition-all">
<span class="material-symbols-outlined">upload_file</span>
                    Upload from Gallery
                </button>
</div>
</div>
<div class="p-6 text-center">
<div class="inline-flex items-center gap-2 bg-primary/10 px-4 py-2 rounded-full border border-primary/20">
<span class="material-symbols-outlined text-primary text-sm">lock</span>
<p class="text-xs font-medium text-primary">Your data is encrypted and secure</p>
</div>
</div>
<div class="h-6"></div>
</div>
</body></html>
