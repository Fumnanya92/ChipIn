<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#0f9dbd",
                        "background-light": "#f6f8f8",
                        "background-dark": "#0a1214",
                        "slate-850": "#111c1f",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.5rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "2xl": "1rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<title>Post a Split - Details</title>
<style>
        body {
            min-height: max(884px, 100dvh);
        }
        /* Custom scrollbar for dark theme */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #0a1214;
        }
        ::-webkit-scrollbar-thumb {
            background: #1e2e32;
            border-radius: 4px;
        }
    </style>
</head>
<body class="bg-background-dark font-display text-slate-100 min-h-screen">
<div class="relative flex h-auto min-h-screen w-full max-w-md mx-auto flex-col bg-background-dark shadow-2xl overflow-x-hidden border-x border-white/5">
<!-- Top Navigation -->
<div class="flex items-center bg-background-dark p-4 pb-2 justify-between sticky top-0 z-10 border-b border-white/5">
<div class="text-slate-100 flex size-12 shrink-0 items-center cursor-pointer hover:bg-white/5 rounded-full justify-center transition-colors">
<span class="material-symbols-outlined">arrow_back</span>
</div>
<h2 class="text-slate-100 text-lg font-bold leading-tight tracking-tight flex-1 text-center pr-12">Post a Split</h2>
</div>
<!-- Progress Indicator -->
<div class="flex flex-col gap-3 p-4 bg-background-dark">
<div class="flex gap-6 justify-between items-end">
<p class="text-slate-100 text-base font-semibold leading-normal">Details</p>
<p class="text-slate-400 text-sm font-medium leading-normal">Step 2 of 3</p>
</div>
<div class="rounded-full bg-white/10 h-2 w-full overflow-hidden">
<div class="h-full rounded-full bg-primary shadow-[0_0_8px_rgba(15,157,189,0.5)]" style="width: 66%;"></div>
</div>
</div>
<!-- Form Content -->
<div class="flex flex-col gap-6 p-4 flex-1">
<!-- Title Input -->
<div class="flex flex-col gap-2">
<label class="text-slate-400 text-xs font-bold uppercase tracking-widest">Split Title</label>
<input class="form-input flex w-full rounded-lg border-white/10 bg-slate-850 focus:border-primary focus:ring-primary focus:ring-offset-0 h-14 placeholder:text-slate-600 p-4 text-base text-slate-100 transition-all" placeholder="e.g. Netflix Premium Subscription" type="text"/>
</div>
<!-- Location Section -->
<div class="flex flex-col gap-2">
<div class="flex items-center justify-between mb-1">
<label class="text-slate-400 text-xs font-bold uppercase tracking-widest">Location</label>
<div class="flex items-center gap-3">
<span class="text-xs text-slate-500 font-medium">Remote / Global</span>
<label class="relative flex h-[24px] w-[44px] cursor-pointer items-center rounded-full border-none bg-white/10 p-1 has-[:checked]:justify-end has-[:checked]:bg-primary transition-all">
<div class="h-4 w-4 rounded-full bg-white shadow-sm"></div>
<input checked="" class="invisible absolute" type="checkbox"/>
</label>
</div>
</div>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-500 text-xl">location_on</span>
<input class="form-input flex w-full rounded-lg border-white/10 bg-slate-850 focus:border-primary focus:ring-primary focus:ring-offset-0 h-14 placeholder:text-slate-600 pl-12 pr-4 text-base text-slate-100 transition-all" placeholder="City, Country or Venue" type="text" value="Global / Online"/>
</div>
</div>
<div class="grid grid-cols-2 gap-4">
<!-- Total Cost -->
<div class="flex flex-col gap-2">
<label class="text-slate-400 text-xs font-bold uppercase tracking-widest">Total Cost</label>
<div class="relative">
<span class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-500 font-medium">$</span>
<input class="form-input flex w-full rounded-lg border-white/10 bg-slate-850 focus:border-primary focus:ring-primary focus:ring-offset-0 h-14 pl-8 pr-4 text-base font-semibold text-slate-100 transition-all" type="number" value="60.00"/>
</div>
</div>
<!-- Number of Slots -->
<div class="flex flex-col gap-2">
<label class="text-slate-400 text-xs font-bold uppercase tracking-widest">Available Slots</label>
<div class="flex items-center h-14 bg-slate-850 border border-white/10 rounded-lg overflow-hidden">
<button class="flex-1 h-full flex items-center justify-center hover:bg-white/5 transition-colors text-primary active:scale-95">
<span class="material-symbols-outlined text-xl">remove</span>
</button>
<div class="w-10 text-center font-bold text-lg text-slate-100">4</div>
<button class="flex-1 h-full flex items-center justify-center hover:bg-white/5 transition-colors text-primary active:scale-95">
<span class="material-symbols-outlined text-xl">add</span>
</button>
</div>
</div>
</div>
<!-- Calculation Card - Highlighted -->
<div class="bg-primary/10 rounded-2xl p-6 border-2 border-primary/30 mt-2 relative overflow-hidden group">
<div class="absolute top-0 right-0 p-8 bg-primary/5 rounded-full -mr-10 -mt-10 blur-2xl"></div>
<div class="flex items-center justify-between relative z-10">
<div>
<p class="text-primary text-xs font-extrabold uppercase tracking-widest mb-1">Your Share</p>
<div class="flex items-baseline gap-1">
<p class="text-4xl font-black text-slate-100 tracking-tight">$15.00</p>
<p class="text-sm font-medium text-slate-500">/ person</p>
</div>
</div>
<div class="bg-primary text-white p-3.5 rounded-xl shadow-[0_0_20px_rgba(15,157,189,0.3)]">
<span class="material-symbols-outlined text-2xl">calculate</span>
</div>
</div>
<div class="mt-4 pt-4 border-t border-primary/20 text-xs text-slate-400 font-medium flex items-center gap-2">
<span class="material-symbols-outlined text-sm text-primary">info</span>
                    Cost is split equally between you and 3 others.
                </div>
</div>
</div>
<!-- Sticky Footer Buttons -->
<div class="p-4 flex gap-3 bg-background-dark border-t border-white/5 sticky bottom-0">
<button class="flex-1 h-14 rounded-lg border border-white/10 font-bold text-slate-300 hover:bg-white/5 active:scale-[0.98] transition-all">
                Back
            </button>
<button class="flex-[2] h-14 rounded-lg bg-primary font-bold text-white shadow-lg shadow-primary/20 hover:brightness-110 active:scale-[0.98] transition-all flex items-center justify-center gap-2">
                Continue
                <span class="material-symbols-outlined text-xl">arrow_forward</span>
</button>
</div>
<div class="h-6 bg-background-dark"></div>
</div>
</body></html>
