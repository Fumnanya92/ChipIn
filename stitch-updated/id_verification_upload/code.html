<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#11b4d4",
                        "background-light": "#f6f8f8",
                        "background-dark": "#101f22",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 antialiased">
<div class="relative mx-auto min-h-screen max-w-md flex flex-col bg-background-light dark:bg-background-dark overflow-hidden">
<!-- Header -->
<div class="flex items-center p-6 justify-between">
<button class="text-slate-900 dark:text-slate-100 flex size-10 items-center justify-center rounded-full bg-slate-200/50 dark:bg-primary/10 transition-colors">
<span class="material-symbols-outlined">arrow_back</span>
</button>
<h2 class="text-lg font-bold leading-tight tracking-tight flex-1 text-center pr-10">ID Verification</h2>
</div>
<!-- Progress Indicator -->
<div class="flex w-full flex-row items-center justify-center gap-3 py-4">
<div class="h-1.5 w-8 rounded-full bg-primary shadow-[0_0_8px_rgba(17,180,212,0.6)]"></div>
<div class="h-1.5 w-8 rounded-full bg-slate-300 dark:bg-primary/20"></div>
<div class="h-1.5 w-8 rounded-full bg-slate-300 dark:bg-primary/20"></div>
</div>
<!-- Main Content -->
<div class="flex-1 flex flex-col px-6 pt-4 pb-8 items-center">
<div class="text-center mb-8">
<h3 class="text-2xl font-bold leading-tight mb-2">Step 1: ID Upload</h3>
<p class="text-slate-600 dark:text-slate-400 text-sm leading-relaxed max-w-[280px] mx-auto">
                    Position your government-issued ID (Passport or Driver's License) within the frame
                </p>
</div>
<!-- ID Scanning Frame Area -->
<div class="relative w-full aspect-[1.586/1] rounded-xl overflow-hidden bg-slate-200 dark:bg-slate-800/40 border-2 border-dashed border-slate-300 dark:border-primary/30 flex items-center justify-center group">
<!-- Background Image Placeholder (Subtle pattern) -->
<div class="absolute inset-0 opacity-20 bg-[radial-gradient(circle_at_center,_var(--tw-gradient-stops))] from-primary/40 via-transparent to-transparent"></div>
<!-- Scanning Frame Corners -->
<div class="absolute top-4 left-4 w-12 h-12 border-t-4 border-l-4 border-primary rounded-tl-lg"></div>
<div class="absolute top-4 right-4 w-12 h-12 border-t-4 border-r-4 border-primary rounded-tr-lg"></div>
<div class="absolute bottom-4 left-4 w-12 h-12 border-b-4 border-l-4 border-primary rounded-bl-lg"></div>
<div class="absolute bottom-4 right-4 w-12 h-12 border-b-4 border-r-4 border-primary rounded-br-lg"></div>
<!-- Central Icon -->
<div class="flex flex-col items-center gap-4 z-10">
<div class="size-16 rounded-full bg-primary/10 flex items-center justify-center">
<span class="material-symbols-outlined text-primary text-4xl">badge</span>
</div>
<span class="text-xs font-medium uppercase tracking-widest text-primary/60">Front of ID card</span>
</div>
<!-- AI Scanning Line Effect -->
<div class="absolute left-0 right-0 h-0.5 bg-primary/50 shadow-[0_0_15px_#11b4d4] top-1/2"></div>
</div>
<div class="mt-auto w-full flex flex-col gap-4 pt-10">
<!-- Main Action -->
<button class="w-full bg-primary hover:bg-primary/90 text-background-dark font-bold py-4 rounded-xl flex items-center justify-center gap-3 transition-all active:scale-[0.98] shadow-lg shadow-primary/20">
<span class="material-symbols-outlined">photo_camera</span>
                    Take Photo
                </button>
<!-- Secondary Action -->
<button class="w-full text-slate-500 dark:text-slate-400 font-medium py-3 rounded-xl transition-colors hover:text-primary">
                    Skip for now
                </button>
</div>
</div>
<!-- Bottom Navigation Bar -->
<div class="flex gap-2 border-t border-slate-200 dark:border-primary/10 bg-white dark:bg-background-dark px-4 pb-6 pt-2">
<a class="flex flex-1 flex-col items-center justify-center gap-1 text-slate-400 dark:text-slate-500 hover:text-primary transition-colors" href="#">
<div class="flex h-8 items-center justify-center">
<span class="material-symbols-outlined">home</span>
</div>
</a>
<a class="flex flex-1 flex-col items-center justify-center gap-1 text-slate-400 dark:text-slate-500 hover:text-primary transition-colors" href="#">
<div class="flex h-8 items-center justify-center">
<span class="material-symbols-outlined">account_balance_wallet</span>
</div>
</a>
<a class="flex flex-1 flex-col items-center justify-center gap-1 rounded-full text-primary" href="#">
<div class="flex h-10 w-10 items-center justify-center bg-primary/20 rounded-full border border-primary/30">
<span class="material-symbols-outlined fill-1">center_focus_weak</span>
</div>
</a>
<a class="flex flex-1 flex-col items-center justify-center gap-1 text-slate-400 dark:text-slate-500 hover:text-primary transition-colors" href="#">
<div class="flex h-8 items-center justify-center">
<span class="material-symbols-outlined">settings</span>
</div>
</a>
</div>
</div>
</body></html>
