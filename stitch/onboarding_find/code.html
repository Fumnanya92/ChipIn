<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>ChipIn - Onboarding</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#11b4d4",
                        "background-light": "#f6f8f8",
                        "background-dark": "#101f22",
                    },
                    fontFamily: {
                        "display": ["Inter"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 antialiased">
<div class="relative flex h-screen w-full flex-col overflow-x-hidden max-w-md mx-auto bg-white dark:bg-background-dark">

<div class="flex items-center justify-end p-6">
<button class="text-primary hover:text-primary/80 text-base font-semibold transition-colors">
                Skip

</div>
<!-- Main Content (Carousel Area) -->
<div class="flex flex-1 flex-col justify-center px-6">
<div class="flex flex-col gap-8">
<!-- Illustration/Image Card -->
<div class="relative w-full aspect-[4/5] rounded-xl overflow-hidden shadow-sm bg-primary/10">
<img alt="Group of friends sharing expenses" class="w-full h-full object-cover" data-alt="Happy diverse group of friends laughing together outside" src="https://lh3.googleusercontent.com/aida-public/AB6AXuByck_bnBefztRzcZ6gmtLt_ITOgoaTIwyBWnOdMqKqpTJPra9EGpnKfgWJz4b0AiKV_dAhC_49sGkp3Kp0ESQr3shX59_NlFoHsPNccgqnCtjaCBE8oak0fbmchokknWs9BzZY0uEET3BZxr_WMPQsoVvlr3fBsEQ9SzNRy4YaRUE_-MCfo7U4b-g8NgKjG9_BPqs9LX83g6wOVgjaikrIEk-cShxOtVe7P5YEZ09g303QtzM2l5Pide0rQPoknMS70q0uKSbAYHVB"/>
<!-- Decorative Overlay -->
<div class="absolute inset-0 bg-gradient-to-t from-background-light/40 to-transparent"></div>
</div>
<!-- Text Content -->
<div class="space-y-3">
<h1 class="text-2xl font-bold text-slate-900 dark:text-slate-100 tracking-tight leading-tight">
                        Find Trusted Partners
                    </h1>
<p class="text-slate-600 dark:text-slate-400 text-base leading-relaxed">
                        Split costs for rent, subscriptions, and more with verified people in your community.
                    </p>
</div>
</div>
</div>
<!-- Footer / Navigation -->
<div class="flex flex-col items-center gap-6 px-6 pb-12">
<!-- Carousel Indicators -->
<div class="flex flex-row items-center justify-center gap-2">
<div class="h-2 w-6 rounded-full bg-primary"></div>
<div class="h-2 w-2 rounded-full bg-primary/20 dark:bg-primary/30"></div>
<div class="h-2 w-2 rounded-full bg-primary/20 dark:bg-primary/30"></div>
</div>
<!-- Action Button -->
<button class="flex w-full cursor-pointer items-center justify-center rounded-xl h-14 bg-primary text-slate-900 text-lg font-bold tracking-wide transition-all hover:bg-primary/90 active:scale-[0.98] shadow-lg shadow-primary/20">
<span class="flex items-center gap-2">
                    Next
                    <span class="material-symbols-outlined text-xl">arrow_forward</span>
</span>
</button>
</div>
</div>
</body></html>
