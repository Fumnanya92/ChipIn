<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#11b4d4",
                        "background-light": "#f6f8f8",
                        "background-dark": "#101f22",
                    },
                    fontFamily: {
                        "display": ["Inter"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<title>Post a Split - Details</title>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 min-h-screen">
<div class="relative flex h-auto min-h-screen w-full max-w-md mx-auto flex-col bg-white dark:bg-background-dark shadow-xl overflow-x-hidden">
<!-- Top Navigation -->
<div class="flex items-center bg-white dark:bg-background-dark p-4 pb-2 justify-between sticky top-0 z-10 border-b border-primary/10">
<div class="text-slate-900 dark:text-slate-100 flex size-12 shrink-0 items-center cursor-pointer">
<span class="material-symbols-outlined">arrow_back</span>
</div>
<h2 class="text-slate-900 dark:text-slate-100 text-lg font-bold leading-tight tracking-tight flex-1 text-center pr-12">Post a Split</h2>
</div>
<!-- Progress Indicator -->
<div class="flex flex-col gap-3 p-4 bg-white dark:bg-background-dark">
<div class="flex gap-6 justify-between items-end">
<p class="text-slate-900 dark:text-slate-100 text-base font-semibold leading-normal">Details</p>
<p class="text-slate-500 dark:text-slate-400 text-sm font-medium leading-normal">Step 2 of 3</p>
</div>
<div class="rounded-full bg-primary/20 h-2 w-full overflow-hidden">
<div class="h-full rounded-full bg-primary" style="width: 66%;"></div>
</div>
</div>
<!-- Form Content -->
<div class="flex flex-col gap-6 p-4 flex-1">
<!-- Title Input -->
<div class="flex flex-col gap-2">
<label class="text-slate-900 dark:text-slate-100 text-sm font-semibold uppercase tracking-wider">Split Title</label>
<input class="form-input flex w-full rounded-lg border-primary/20 bg-white dark:bg-slate-800 focus:border-primary focus:ring-primary h-14 placeholder:text-slate-400 p-4 text-base" placeholder="e.g. Netflix Premium Subscription" type="text"/>
</div>
<!-- Location Section -->
<div class="flex flex-col gap-2">
<div class="flex items-center justify-between mb-1">
<label class="text-slate-900 dark:text-slate-100 text-sm font-semibold uppercase tracking-wider">Location</label>
<div class="flex items-center gap-2">
<span class="text-xs text-slate-500 font-medium">Remote / Global</span>
<label class="relative flex h-[24px] w-[44px] cursor-pointer items-center rounded-full border-none bg-primary/20 p-1 has-[:checked]:justify-end has-[:checked]:bg-primary">
<div class="h-4 w-4 rounded-full bg-white shadow-sm"></div>
<input checked="" class="invisible absolute" type="checkbox"/>
</label>
</div>
</div>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 text-xl">location_on</span>
<input class="form-input flex w-full rounded-lg border-primary/20 bg-white dark:bg-slate-800 focus:border-primary focus:ring-primary h-14 placeholder:text-slate-400 pl-12 pr-4 text-base" placeholder="City, Country or Venue" type="text" value="Global / Online"/>
</div>
</div>
<div class="grid grid-cols-2 gap-4">
<!-- Total Cost -->
<div class="flex flex-col gap-2">
<label class="text-slate-900 dark:text-slate-100 text-sm font-semibold uppercase tracking-wider">Total Cost</label>
<div class="relative">
<span class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 font-medium">$</span>
<input class="form-input flex w-full rounded-lg border-primary/20 bg-white dark:bg-slate-800 focus:border-primary focus:ring-primary h-14 pl-8 pr-4 text-base font-medium" type="number" value="60.00"/>
</div>
</div>
<!-- Number of Slots -->
<div class="flex flex-col gap-2">
<label class="text-slate-900 dark:text-slate-100 text-sm font-semibold uppercase tracking-wider">Available Slots</label>
<div class="flex items-center h-14 bg-white dark:bg-slate-800 border border-primary/20 rounded-lg overflow-hidden">
<button class="flex-1 h-full flex items-center justify-center hover:bg-primary/5 transition-colors">
<span class="material-symbols-outlined text-primary text-xl">remove</span>
</button>
<div class="w-12 text-center font-bold text-lg text-slate-900 dark:text-slate-100">4</div>
<button class="flex-1 h-full flex items-center justify-center hover:bg-primary/5 transition-colors">
<span class="material-symbols-outlined text-primary text-xl">add</span>
</button>
</div>
</div>
</div>
<!-- Calculation Card -->
<div class="bg-primary/10 rounded-xl p-5 border border-primary/20 mt-2">
<div class="flex items-center justify-between">
<div>
<p class="text-primary text-xs font-bold uppercase tracking-widest mb-1">Your Share</p>
<p class="text-3xl font-black text-slate-900 dark:text-slate-100">$15.00 <span class="text-sm font-normal text-slate-500">/ person</span></p>
</div>
<div class="bg-primary/20 p-3 rounded-full">
<span class="material-symbols-outlined text-primary text-2xl">calculate</span>
</div>
</div>
<div class="mt-3 pt-3 border-t border-primary/10 text-xs text-slate-500 italic">
                    Cost is split equally between you and 3 others.
                </div>
</div>
</div>
<!-- Sticky Footer Buttons -->
<div class="p-4 flex gap-3 bg-white dark:bg-background-dark border-t border-primary/10 sticky bottom-0">
<button class="flex-1 h-14 rounded-xl border border-primary/30 font-bold text-primary hover:bg-primary/5 transition-all">
                Back
            </button>
<button class="flex-[2] h-14 rounded-xl bg-primary font-bold text-white shadow-lg shadow-primary/20 hover:opacity-90 transition-all flex items-center justify-center gap-2">
                Continue
                <span class="material-symbols-outlined text-xl">arrow_forward</span>
</button>
</div>
<div class="h-6 bg-white dark:bg-background-dark"></div>
</div>
</body></html>
