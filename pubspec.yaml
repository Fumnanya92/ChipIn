name: chipin
description: "ChipIn — Find trusted partners and split costs securely."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.5.3

  # Navigation
  go_router: ^12.1.3

  # Backend
  supabase_flutter: ^2.5.2

  # UI and styling
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.10+1

  # Image handling
  image_picker: ^1.1.2
  cached_network_image: ^3.4.1

  # Device features
  camera: ^0.10.6
  permission_handler: ^11.3.1

  # Utilities
  intl: ^0.19.0
  uuid: ^4.5.1
  equatable: ^2.0.5
  json_annotation: ^4.9.0

  # HTTP (Termii OTP API)
  http: ^1.2.2

  # Loading shimmer skeleton
  shimmer: ^3.0.0

  # Relative timestamps
  timeago: ^3.7.0

  # Open external links
  url_launcher: ^6.3.1

  # Simple local cache
  shared_preferences: ^2.3.3

  # Charts (Analytics — future use)
  fl_chart: ^0.69.0

  # Notifications
  flutter_local_notifications: ^17.2.3

  # Storage
  path_provider: ^2.1.5
  path: ^1.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  riverpod_generator: ^2.6.3
  build_runner: ^2.4.13
  json_serializable: ^6.8.0
  flutter_launcher_icons: ^0.14.1

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/

  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Thin.ttf
          weight: 100
        - asset: assets/fonts/Inter-ExtraLight.ttf
          weight: 200
        - asset: assets/fonts/Inter-Light.ttf
          weight: 300
        - asset: assets/fonts/Inter-Regular.ttf
          weight: 400
        - asset: assets/fonts/Inter-Medium.ttf
          weight: 500
        - asset: assets/fonts/Inter-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Inter-Bold.ttf
          weight: 700
        - asset: assets/fonts/Inter-ExtraBold.ttf
          weight: 800
        - asset: assets/fonts/Inter-Black.ttf
          weight: 900
